<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thunder's Oracle Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .card { background-color: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; border: 1px solid #1e293b; }
        .delta-up { color: #4ade80; }
        .delta-down { color: #f87171; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-6 gap-4">
            <div><h1 class="text-2xl font-bold text-sky-400 tracking-tighter uppercase">🦾 JARVIS ORACLE</h1></div>
            <div class="flex items-center gap-4">
                <div class="relative flex">
                    <input type="text" id="search-input" placeholder="Search..." class="bg-slate-900 border border-slate-700 rounded-l px-3 py-2 text-sm focus:outline-none w-64 text-sky-200">
                    <button onclick="handleSearch()" class="bg-sky-700 hover:bg-sky-600 text-white px-4 py-2 rounded-r text-sm font-bold">EXEC</button>
                </div>
                <div class="text-right pl-4 border-l border-slate-800">
                    <span id="last-update" class="text-sky-600 font-mono text-sm">SYNCING...</span>
                </div>
            </div>
        </header>
        <div id="error-msg" class="hidden mb-6 p-4 bg-red-900/20 border border-red-500/50 text-red-400 text-xs font-mono rounded"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section><h2 class="text-sm font-bold mb-4 text-slate-400 uppercase">>>> Focus</h2><div id="ai_list" class="space-y-3"></div></section>
            <section><h2 class="text-sm font-bold mb-4 text-slate-400 uppercase">>>> Alerts</h2><div id="alerts_list" class="space-y-3"></div></section>
            <section><h2 class="text-sm font-bold mb-4 text-slate-400 uppercase">>>> Movers</h2><div id="movers_list" class="space-y-3"></div></section>
        </div>
    </div>
    <script>
        let currentSearch = '';
        function handleSearch() { currentSearch = document.getElementById('search-input').value; refresh(); }
        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
        async function refresh() {
            const errBox = document.getElementById('error-msg');
            try {
                const res = await fetch(`/api/data?q=${encodeURIComponent(currentSearch)}`);
                const data = await res.json();
                if (data.error) {
                    errBox.innerText = `[!] API_ERROR: ${data.error}`;
                    errBox.classList.remove('hidden');
                } else {
                    errBox.classList.add('hidden');
                    document.getElementById('last-update').innerText = data.last_update;
                    const render = (id, list) => {
                        const container = document.getElementById(id);
                        if (!list || list.length === 0) { container.innerHTML = '<p class="text-[10px] text-slate-700">VOID</p>'; return; }
                        container.innerHTML = list.map(m => `
                            <div class="card p-4 hover:bg-slate-800/30 transition-all">
                                <p class="text-[12px] font-medium mb-3 leading-snug">${m.question}</p>
                                <div class="flex justify-between items-end">
                                    <div>
                                        <span class="text-2xl font-bold text-sky-400">${m.current_prob.toFixed(1)}%</span>
                                        <span class="text-[10px] ml-1 font-bold ${m.delta_24h >= 0 ? 'delta-up' : 'delta-down'}">
                                            ${m.delta_24h >= 0 ? '▲' : '▼'} ${Math.abs(m.delta_24h).toFixed(1)}%
                                        </span>
                                    </div>
                                    <p class="text-[9px] text-slate-600 font-mono">$${(m.volume/1000).toFixed(0)}k</p>
                                </div>
                            </div>
                        `).join('');
                    };
                    render('ai_list', data.ai_focus); render('alerts_list', data.critical_alerts); render('movers_list', data.top_movers);
                }
            } catch (e) { console.error(e); }
        }
        setInterval(refresh, 60000); refresh();
    </script>
</body>
</html>
