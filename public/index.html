<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS ORACLE - Prediction Market Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background: #020617;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Subtle animated gradient background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 600px 400px at 20% 10%, rgba(56, 189, 248, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 70%),
                #020617;
        }

        /* Cards */
        .card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.6));
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #38bdf8, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 20px rgba(56, 189, 248, 0.05);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Probability bar */
        .prob-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            border-radius: 0 2px 0 0;
            transition: width 0.6s ease;
        }

        /* Delta badges */
        .delta-up {
            color: #4ade80;
        }

        .delta-down {
            color: #f87171;
        }

        .delta-badge {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .delta-badge.up {
            background: rgba(74, 222, 128, 0.1);
        }

        .delta-badge.down {
            background: rgba(248, 113, 113, 0.1);
        }

        /* Search */
        .search-container {
            position: relative;
            display: flex;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(51, 65, 85, 0.6);
            transition: border-color 0.3s;
        }

        .search-container:focus-within {
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .search-input {
            background: rgba(15, 23, 42, 0.8);
            border: none;
            outline: none;
            padding: 10px 16px;
            width: 280px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .search-input::placeholder {
            color: #475569;
        }

        .search-btn {
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .search-btn:hover {
            filter: brightness(1.15);
        }

        .search-btn:active {
            transform: scale(0.97);
        }

        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
        }

        .section-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Sync badge */
        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.5);
            font-size: 12px;
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.5) 25%, rgba(51, 65, 85, 0.3) 50%, rgba(30, 41, 59, 0.5) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Volume tag */
        .vol-tag {
            font-size: 10px;
            color: #475569;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(30, 41, 59, 0.5);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-5">
            <div class="flex items-center gap-3">
                <div class="text-3xl">🦾</div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white">JARVIS ORACLE</h1>
                    <p class="text-[11px] text-slate-500 mt-0.5 mono">POLYMARKET INTELLIGENCE FEED</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search markets..." class="search-input">
                    <button onclick="handleSearch()" class="search-btn" id="search-btn">🔍 Search</button>
                </div>
                <div class="sync-badge mono">
                    <span class="sync-dot"></span>
                    <span id="last-update" class="text-slate-400">Syncing...</span>
                </div>
            </div>
        </header>

        <!-- Error -->
        <div id="error-msg"
            class="hidden mb-6 p-4 bg-red-900/10 border border-red-500/30 text-red-400 text-xs mono rounded-lg"></div>

        <!-- Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section>
                <div class="section-header">
                    <span class="section-icon" style="background: #38bdf8;"></span>
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Focus</h2>
                </div>
                <div id="ai_list" class="space-y-3">
                    <div class="skeleton h-24"></div>
                    <div class="skeleton h-24"></div>
                    <div class="skeleton h-24"></div>
                </div>
            </section>
            <section>
                <div class="section-header">
                    <span class="section-icon" style="background: #f59e0b;"></span>
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Alerts</h2>
                </div>
                <div id="alerts_list" class="space-y-3">
                    <div class="skeleton h-24"></div>
                    <div class="skeleton h-24"></div>
                    <div class="skeleton h-24"></div>
                </div>
            </section>
            <section>
                <div class="section-header">
                    <span class="section-icon" style="background: #a78bfa;"></span>
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Movers</h2>
                </div>
                <div id="movers_list" class="space-y-3">
                    <div class="skeleton h-24"></div>
                    <div class="skeleton h-24"></div>
                    <div class="skeleton h-24"></div>
                </div>
            </section>
        </div>

        <!-- Footer -->
        <footer class="mt-12 pt-6 border-t border-slate-800/50 text-center">
            <p class="text-[10px] text-slate-600 mono">POWERED BY POLYMARKET · DATA REFRESHED EVERY 60S</p>
        </footer>
    </div>

    <script>
        let currentSearch = '';
        const searchBtn = document.getElementById('search-btn');
        const searchInput = document.getElementById('search-input');

        function handleSearch() {
            currentSearch = searchInput.value;
            searchBtn.textContent = '⏳ Loading...';
            searchBtn.disabled = true;
            refresh().finally(() => {
                searchBtn.textContent = '🔍 Search';
                searchBtn.disabled = false;
            });
        }

        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });

        async function refresh() {
            const errBox = document.getElementById('error-msg');
            try {
                const res = await fetch(`/api/data?q=${encodeURIComponent(currentSearch)}`);
                const data = await res.json();
                if (data.error) {
                    errBox.innerText = `[!] API_ERROR: ${data.error}`;
                    errBox.classList.remove('hidden');
                } else {
                    errBox.classList.add('hidden');
                    document.getElementById('last-update').innerText = data.last_update;
                    const render = (id, list) => {
                        const container = document.getElementById(id);
                        if (!list || list.length === 0) {
                            container.innerHTML = '<p class="text-xs text-slate-700 text-center py-8 mono">No data</p>';
                            return;
                        }
                        container.innerHTML = list.map(m => {
                            const prob = m.current_prob.toFixed(1);
                            const delta = m.delta_24h;
                            const isUp = delta >= 0;
                            const vol = m.volume >= 1000000
                                ? `$${(m.volume / 1000000).toFixed(1)}M`
                                : `$${(m.volume / 1000).toFixed(0)}K`;
                            return `
                            <div class="card p-4 relative">
                                <p class="text-[13px] font-medium mb-4 leading-relaxed text-slate-200 pr-2">${m.question}</p>
                                <div class="flex justify-between items-end">
                                    <div class="flex items-baseline gap-2">
                                        <span class="text-2xl font-bold text-sky-400 mono">${prob}%</span>
                                        <span class="delta-badge ${isUp ? 'up delta-up' : 'down delta-down'} mono">
                                            ${isUp ? '▲' : '▼'} ${Math.abs(delta).toFixed(1)}%
                                        </span>
                                    </div>
                                    <span class="vol-tag mono">${vol}</span>
                                </div>
                                <div class="prob-bar" style="width: ${prob}%"></div>
                            </div>`;
                        }).join('');
                    };
                    render('ai_list', data.ai_focus);
                    render('alerts_list', data.critical_alerts);
                    render('movers_list', data.top_movers);
                }
            } catch (e) { console.error(e); }
        }

        setInterval(refresh, 60000);
        refresh();
    </script>
</body>

</html>
